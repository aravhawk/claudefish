commands:
  install: pnpm install
  build-engine: source ./emsdk/emsdk_env.sh && ./scripts/build-engine.sh
  build: pnpm build
  dev: pnpm dev --turbopack --port 3001
  test-engine: gcc -O2 -o /tmp/claudefish_test engine/src/*.c engine/tests/*.c -lm && /tmp/claudefish_test
  test: >-
    if [ -f package.json ] && grep -q '"test"' package.json 2>/dev/null; then
    pnpm test;
    elif ls engine/tests/*.c 1>/dev/null 2>&1; then
    gcc -O2 -o /tmp/claudefish_test engine/src/*.c engine/tests/*.c -lm && /tmp/claudefish_test;
    else
    echo "No tests configured yet" && exit 0;
    fi
  typecheck: >-
    if [ -f package.json ] && grep -q '"typecheck"' package.json 2>/dev/null; then
    pnpm typecheck;
    else
    echo "No typecheck configured yet" && exit 0;
    fi
  lint: >-
    if [ -f package.json ] && grep -q '"lint"' package.json 2>/dev/null; then
    pnpm lint;
    else
    echo "No lint configured yet" && exit 0;
    fi

services:
  web:
    start: pnpm dev --turbopack --port 3001
    stop: lsof -ti :3001 | xargs kill -9 2>/dev/null || true
    healthcheck: curl -sf http://localhost:3001
    port: 3001
    depends_on: []
